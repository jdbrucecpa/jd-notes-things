name: Release

on:
  push:
    tags:
      - 'v*'


permissions:
  contents: write

jobs:
  build:
    # Pinned to windows-2022 (Visual Studio 2022 / v17). windows-latest moved to
    # an image with Visual Studio 18, which the older @electron/node-gyp bundled
    # by electron-forge cannot detect ("unknown version undefined"), breaking the
    # better-sqlite3 node-gyp rebuild during npm ci and the electron-rebuild in make.
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install without lifecycle scripts to skip native-recorder-nodejs's broken
      # source build (prebuild-install misses its bundled N-API prebuild, then the
      # cmake-js fallback fails to link node.lib). Its prebuild is extracted from the
      # tarball and loads under Electron as-is. Then run only the postinstalls that
      # are actually required for the build: electron's binary download, the Recall
      # SDK setup, and electron-winstaller's 7z arch selection (Squirrel maker).
      # better-sqlite3 is rebuilt for Electron by electron-forge (rebuildConfig).
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Run these via `npm rebuild` (not bare `node <script>`): npm sets the CWD to
      # each package's own directory, which @recallai/desktop-sdk's setup.js requires
      # (it reads "./package.json" for its commit_sha; from the repo root that resolves
      # to the wrong file and it downloads an "undefined" tarball). electron's
      # install.js is CWD-independent, so it stays an explicit call.
      - name: Run required native postinstall steps
        shell: bash
        run: |
          node node_modules/electron/install.js
          npm rebuild @recallai/desktop-sdk electron-winstaller ffmpeg-static

      - name: Build and package
        run: npm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            out/make/squirrel.windows/x64/*.exe
            out/make/squirrel.windows/x64/*.nupkg
            out/make/squirrel.windows/x64/RELEASES
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
